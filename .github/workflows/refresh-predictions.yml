name: Refresh predictions

# Runs the full dual-Elo Negative Binomial pipeline:
#   updateEloSplit.js -> calibrateNegBin.js -> runSimulationNegBin.js -> runScenarioNegBin.js
# Writes: elo_current_split.json, negbin_calibration.json,
#         predictions_negbin.json, scenario_negbin.json
#
# Does NOT run buildEloSplit.js (Phase 1 / build-elo-split.yml) which fetches
# a live external dataset - that remains a separate, occasional, manual step.

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run full NegBin pipeline (ratings → calibration → simulation → scenario)
        run: node scripts/sim/runFullNegBinPipeline.js

      - name: Sanity-check output
        run: |
          node -e "
            const p = require('./predictions_negbin.json');
            const s = require('./scenario_negbin.json');
            const sum = p.teams.reduce((a, t) => a + t.pChampion, 0);
            console.log('Sum of pChampion:', sum.toFixed(4), '(expect ~1.0)');
            if (Math.abs(sum - 1) > 0.01) {
              console.error('ERROR: pChampion does not sum to ~1. Refusing to commit.');
              process.exit(1);
            }
            if (!s.champion || !s.champion.name) {
              console.error('ERROR: scenario_negbin.json has no champion. Refusing to commit.');
              process.exit(1);
            }
            console.log('Champion:', s.champion.name);
          "

      - name: Commit updated prediction files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add elo_current_split.json negbin_calibration.json \
                  predictions_negbin.json scenario_negbin.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Refresh predictions ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin main; then
                echo "Pushed successfully."
                exit 0
              fi
            else
              echo "Rebase conflict - aborting."
              git rebase --abort
              exit 1
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done

          echo "ERROR: failed to push after retries."
          exit 1
