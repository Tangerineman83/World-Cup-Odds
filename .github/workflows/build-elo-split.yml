name: Build ELO split and calibrate parameters

# Manual trigger only — run this when you want to refresh the baseline
# ratings and re-fit the NegBin parameters from scratch. Two reasons to
# trigger this deliberately rather than automatically:
#
#   1. buildEloSplit.js fetches a third-party historical dataset over the
#      network (martj42/international_results on GitHub). Network-dependent
#      steps are kept out of the scheduled refresh to avoid flaky failures.
#
#   2. Changing KAPPA_PLACEHOLDER or the calibration window in buildEloSplit.js
#      is a deliberate modelling decision — you want to review the output
#      (team ratings, kappa sanity check) before it feeds into predictions.
#
# What this workflow now does (in order):
#   1. buildEloSplit.js     — fetches historical data, derives attack/defence
#                             split ratings, writes elo_baseline_split.json
#   2. calibrateNegBin.js   — fits alpha/gamma/sigma/r jointly against all
#                             played results, writes negbin_calibration.json
#
# Step 2 is added here because changing the baseline (step 1) changes the
# pre-match ratings used in the likelihood fit — the two outputs are coupled.
# Running calibration immediately after baseline generation ensures
# negbin_calibration.json always reflects the current baseline, not a stale
# one from a prior run. The scheduled refresh-predictions workflow then picks
# up both fresh files when it next runs.
#
# refresh-predictions.yml also runs calibrateNegBin.js as step 2 of its own
# sequence (via runFullNegBinPipeline.js) — so calibration always re-runs on
# new match results too, regardless of whether this workflow has been
# triggered recently.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-calibrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Step 1 — buildEloSplit.js (baseline attack/defence ratings)
        run: node scripts/sim/buildEloSplit.js

      - name: Sanity-check elo_baseline_split.json
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('elo_baseline_split.json')) {
              console.error('ERROR: elo_baseline_split.json was not written. Refusing to continue.');
              process.exit(1);
            }
            const data = require('./elo_baseline_split.json');
            const teams = Object.keys(data.ratings || {});
            console.log('Teams in output:', teams.length, '(expect 48)');
            if (teams.length !== 48) {
              console.error('ERROR: expected 48 teams, got ' + teams.length + '. Refusing to continue.');
              process.exit(1);
            }
            const zeroMatch = teams.filter(t => data.ratings[t].matchesUsed === 0);
            const thin = teams.filter(t => data.ratings[t].thinHistory);
            console.log('Teams with zero matches (fell back to overall):', zeroMatch.length, zeroMatch);
            console.log('Teams with thin history:', thin.length, thin);
            console.log('kappa:', data.kappa, '(' + data.kappaStatus + ')');
          "

      - name: Step 2 — calibrateNegBin.js (fit NegBin parameters)
        run: node scripts/sim/calibrateNegBin.js

      - name: Sanity-check negbin_calibration.json
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('negbin_calibration.json')) {
              console.error('ERROR: negbin_calibration.json was not written. Refusing to commit.');
              process.exit(1);
            }
            const c = require('./negbin_calibration.json');
            const p = c.recommendedParams;
            console.log('Fitted parameters:');
            console.log('  alpha:', p.alpha, '  (exp(alpha) = avg goals balanced match:', Math.exp(p.alpha).toFixed(3) + ')');
            console.log('  sigma:', p.sigma);
            console.log('  gamma:', p.gamma);
            console.log('  r:', p.r, '(dispersion — higher = fewer draws)');
            console.log('  kappa:', p.kappa);
            console.log('Match count used for fit:', c.matchCount);
            if (p.alpha < 0 || p.alpha > 1)   { console.error('WARNING: alpha out of expected range (0-1)'); }
            if (p.sigma < 200 || p.sigma > 1200) { console.error('WARNING: sigma out of expected range (200-1200)'); }
            if (p.r < 1 || p.r > 50)           { console.error('WARNING: r out of expected range (1-50)'); }
          "

      - name: Commit updated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add elo_baseline_split.json negbin_calibration.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Rebuild ELO split and calibrate parameters ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin main; then
                echo "Pushed successfully."
                exit 0
              fi
            else
              echo "Rebase conflict - aborting. Manual intervention needed."
              git rebase --abort
              exit 1
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done

          echo "ERROR: failed to push after retries."
          exit 1
