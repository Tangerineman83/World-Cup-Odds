name: Refresh all predictions (both models)

# Refreshes BOTH the original Poisson/single-Elo engine AND the dual-Elo
# Negative Binomial engine in a single workflow run, committing all six
# output files together:
#   Original engine:  predictions.json, scenario.json
#   NegBin engine:    elo_current_split.json, negbin_calibration.json,
#                     predictions_negbin.json, scenario_negbin.json
#
# Same schedule as the individual workflows (refresh-predictions.yml and
# refresh-negbin-predictions.yml). Those are retained with their schedules
# DISABLED (workflow_dispatch only) so they remain available for targeted
# manual re-runs of a single engine if needed - for example, if the NegBin
# calibration looks wrong and you want to re-run just that half without
# touching the existing engine's output.
#
# Runs the existing engine first, since runScenario.js reads predictions.json
# (pChampion values for world-ranking), then the NegBin pipeline (which
# similarly reads predictions_negbin.json in its scenario step). No
# dependency between the two engines' outputs - order is arbitrary beyond
# each engine's own internal sequence.
#
# No live network fetch - same rationale as both individual workflows. Does
# NOT run buildEloSplit.js (Phase 1 / build-elo-split.yml) - that fetches
# a live external dataset and remains a separate, occasional, manual step.

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ---- Original engine (Poisson + single-Elo) -------------------------

      - name: '[Original] Run simulation (full probability table)'
        run: node scripts/sim/runSimulation.js

      - name: '[Original] Sanity-check simulation output'
        run: |
          node -e "
            const data = require('./predictions.json');
            const ratings = data.teams.map(t => t.eloRating);
            const min = Math.min(...ratings), max = Math.max(...ratings);
            console.log('Elo range:', min, '-', max, '(spread', (max-min).toFixed(0) + ')');
            if (max - min < 100) {
              console.error('ERROR: Elo spread suspiciously narrow (<100). Refusing to commit.');
              process.exit(1);
            }
            const sum = data.teams.reduce((a, t) => a + t.pChampion, 0);
            console.log('Sum of pChampion:', sum.toFixed(4), '(expect ~1.0)');
            if (Math.abs(sum - 1) > 0.01) {
              console.error('ERROR: pChampion does not sum to ~1. Refusing to commit.');
              process.exit(1);
            }
          "

      - name: '[Original] Run scenario (group tables + bracket)'
        run: node scripts/sim/runScenario.js

      # ---- NegBin engine (dual-Elo Negative Binomial) ---------------------

      - name: '[NegBin] Run full pipeline (ratings → calibration → simulation → scenario)'
        run: node scripts/sim/runFullNegBinPipeline.js

      - name: '[NegBin] Sanity-check output'
        run: |
          node -e "
            const p = require('./predictions_negbin.json');
            const s = require('./scenario_negbin.json');
            const sum = p.teams.reduce((a, t) => a + t.pChampion, 0);
            console.log('Sum of pChampion:', sum.toFixed(4), '(expect ~1.0)');
            if (Math.abs(sum - 1) > 0.01) {
              console.error('ERROR: pChampion does not sum to ~1. Refusing to commit.');
              process.exit(1);
            }
            if (!s.champion || !s.champion.name) {
              console.error('ERROR: scenario_negbin.json has no champion. Refusing to commit.');
              process.exit(1);
            }
            console.log('NegBin champion:', s.champion.name);
          "

      # ---- Single combined commit -----------------------------------------

      - name: Commit all updated prediction files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.json scenario.json \
                  elo_current_split.json negbin_calibration.json \
                  predictions_negbin.json scenario_negbin.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Refresh all predictions ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin main; then
                echo "Pushed successfully."
                exit 0
              fi
            else
              echo "Rebase conflict - aborting rebase. Manual intervention needed."
              git rebase --abort
              exit 1
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done

          echo "ERROR: failed to push after retries."
          exit 1
