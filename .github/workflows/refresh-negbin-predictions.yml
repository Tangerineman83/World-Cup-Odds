name: Refresh NegBin predictions

# NegBin-engine counterpart to refresh-predictions.yml. Runs the entire
# dual-Elo Negative Binomial pipeline (Phase 2 through Phase 4) via a single
# orchestrator script, runFullNegBinPipeline.js, which itself runs
# updateEloSplit.js -> calibrateNegBin.js -> runSimulationNegBin.js ->
# runScenarioNegBin.js in that fixed order, in one Node process - see that
# script's own header for why this is a single script rather than four
# separately-triggered steps (this was a recurring source of ordering
# mistakes earlier in the project).
#
# SAME SCHEDULE as refresh-predictions.yml (the existing engine's workflow)
# by design, so both engines' output stay similarly fresh relative to each
# other - there's no reason for one model's predictions to lag the other's
# by a different amount.
#
# Does NOT run build-elo-split.yml (Phase 1) - that fetches a live
# third-party dataset and remains separately scheduled/manual-only, same as
# it is for the existing engine's pipeline (Phase 1's output,
# elo_baseline_split.json, is shared by both - rebuilding it isn't part of
# either engine's regular refresh cycle).
#
# No live network fetch in THIS workflow - ratings come from
# elo_baseline_split.json (already in the repo) + results.json, so this has
# no external dependency and cannot silently produce uniform/garbage
# ratings from a failed fetch, same rationale as refresh-predictions.yml.
#
# ONCE THIS WORKFLOW HAS A FEW CONFIRMED SUCCESSFUL SCHEDULED RUNS, retire
# update-ratings-and-calibration.yml and run-simulation-negbin.yml - their
# jobs are both fully subsumed by this single workflow. Keep them running in
# parallel for now as a safety net.

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh-negbin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run full NegBin pipeline (ratings -> calibration -> simulation -> scenario)
        run: node scripts/sim/runFullNegBinPipeline.js 20000

      - name: Sanity-check combined output
        run: |
          node -e "
            const p = require('./predictions_negbin.json');
            const s = require('./scenario_negbin.json');
            const sum = p.teams.reduce((a, t) => a + t.pChampion, 0);
            console.log('Sum of pChampion across all teams:', sum.toFixed(4), '(expect ~1.0)');
            if (Math.abs(sum - 1) > 0.01) {
              console.error('ERROR: pChampion does not sum to ~1. Refusing to commit.');
              process.exit(1);
            }
            if (!s.champion || !s.champion.name) {
              console.error('ERROR: scenario_negbin.json has no champion. Refusing to commit.');
              process.exit(1);
            }
            console.log('scenario_negbin.json champion:', s.champion.name);
          "

      - name: Commit updated NegBin files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add elo_current_split.json negbin_calibration.json predictions_negbin.json scenario_negbin.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Refresh NegBin predictions ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin main; then
                echo "Pushed successfully."
                exit 0
              fi
            else
              echo "Rebase conflict - aborting rebase. Manual intervention needed."
              git rebase --abort
              exit 1
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done

          echo "ERROR: failed to push after retries."
          exit 1

